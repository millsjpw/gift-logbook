services:
  db:
    image: postgres:17-alpine
    container_name: gift-logbook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gift_logbook
    volumes:
      - glb_db_data:/var/lib/postgresql/data
    ports:
      - "5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gift_logbook"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    container_name: gift-logbook-server
    build: ./server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      PLATFORM: docker
      DB_URL: postgres://postgres:postgres@db:5432/gift_logbook
      JWT_DEFAULT_DURATION: 3600
      JWT_REFRESH_DURATION: 86400
      JWT_SECRET: change_me_in_production
      JWT_ISSUER: gift-logbook
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  glb_db_data:
